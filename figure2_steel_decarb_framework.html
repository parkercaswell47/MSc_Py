<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Figure 2: Steel Decarbonization Framework</title>
<style>
  body {
    font-family: Helvetica, Arial, sans-serif;
    background: #ffffff;
    padding: 30px;
    margin: 0;
    color: #1a1a1a;
  }
  .figure-container {
    max-width: 880px;
    margin: 0 auto;
  }
  .figure-caption {
    font-size: 11pt;
    line-height: 1.45;
    margin-top: 12px;
    color: #1a1a1a;
  }
  .figure-caption b { font-weight: 600; }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .layer-label {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-style: italic;
    fill: #4a4a4a;
    text-anchor: start;
  }
  .rq-tag {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    fill: #1a1a1a;
    text-anchor: start;
    letter-spacing: 1px;
  }
  .node-label {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 15.5px;
    font-weight: 600;
    fill: #0e2d2f;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  .node-label-sm {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    fill: #1a1a1a;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  .node-sub {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-style: italic;
    fill: #1a3a3a;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  .frame-label {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    font-style: italic;
    fill: #6a4818;
    text-anchor: middle;
    letter-spacing: 0.3px;
  }
  .legend-text {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    fill: #1a1a1a;
    dominant-baseline: middle;
  }
</style>
</head>
<body>

<div class="figure-container">

<svg viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="arrow-gate" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8862a"/>
    </marker>
    <marker id="arrow-enable" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3a4a5a"/>
    </marker>
  </defs>

  <!-- LEFT MARGIN -->
  <text x="12" y="65" class="rq-tag" text-anchor="middle">RQ2</text>
  <text x="12" y="82" class="layer-label" text-anchor="middle">Constraints</text>
  <text x="12" y="94" class="layer-label" text-anchor="middle">push down</text>

  <text x="18" y="297" class="rq-tag" text-anchor="middle">RQ1</text>
  <text x="18" y="314" class="layer-label" text-anchor="middle">Mitigation</text>
  <text x="18" y="326" class="layer-label" text-anchor="middle">routes</text>

  <text x="18" y="527" class="rq-tag" text-anchor="middle">RQ3</text>
  <text x="18" y="544" class="layer-label" text-anchor="middle">Enablers</text>
  <text x="18" y="556" class="layer-label" text-anchor="middle">push up</text>

  <!-- ============================================================
       TOP LAYER: CONSTRAINTS
       ============================================================ -->

  <rect x="77" y="32" width="776" height="94" rx="6"
        fill="#fbf3df" stroke="#8a5a18" stroke-width="1.2" stroke-dasharray="3 4"/>
  <text x="465" y="20" class="frame-label">Regional context affects all constraints</text>

  <rect x="85" y="40" width="180" height="78" rx="3"
        fill="#f7eecd" stroke="#b8862a" stroke-width="1.4"/>
  <text x="175" y="64" class="node-label-sm">Grid carbon intensity</text>
  <text x="175" y="84" class="node-sub" fill="#5a4a1a">single most important enabler</text>
  <text x="175" y="100" class="node-sub" fill="#5a4a1a">of any electrified route</text>

  <rect x="285" y="40" width="180" height="78" rx="3"
        fill="#f7eecd" stroke="#b8862a" stroke-width="1.4"/>
  <text x="375" y="64" class="node-label-sm">Green H2 cost</text>
  <text x="375" y="84" class="node-sub" fill="#5a4a1a">$3-5/kg now, ~$1.65 needed</text>
  <text x="375" y="100" class="node-sub" fill="#5a4a1a">for H2-DRI parity</text>

  <rect x="485" y="40" width="180" height="78" rx="3"
        fill="#f7eecd" stroke="#b8862a" stroke-width="1.4"/>
  <text x="575" y="64" class="node-label-sm">Ore grade</text>
  <text x="575" y="84" class="node-sub" fill="#5a4a1a">only 3% of seaborne ore</text>
  <text x="575" y="100" class="node-sub" fill="#5a4a1a">suitable for H2-DRI</text>

  <rect x="685" y="40" width="160" height="78" rx="3"
        fill="#f7eecd" stroke="#b8862a" stroke-width="1.4"/>
  <text x="765" y="64" class="node-label-sm">Scrap availability</text>
  <text x="765" y="84" class="node-sub" fill="#5a4a1a">region-specific;</text>
  <text x="765" y="100" class="node-sub" fill="#5a4a1a">limits high-strength steel</text>

  <!-- ============================================================
       MIDDLE LAYER: TECHNOLOGIES
       ============================================================ -->

  <rect x="85" y="270" width="180" height="78" rx="3"
        fill="#7fa8a6" stroke="#1e4d4f" stroke-width="1.4"/>
  <text x="175" y="295" class="node-label">H2-DRI-EAF</text>
  <text x="175" y="315" class="node-sub">70-95% Scope 1 cut</text>
  <text x="175" y="331" class="node-sub">grid-dependent; deep</text>

  <rect x="285" y="270" width="180" height="78" rx="3"
        fill="#a8c6c4" stroke="#1e4d4f" stroke-width="1.4"/>
  <text x="375" y="295" class="node-label">Scrap-EAF</text>
  <text x="375" y="315" class="node-sub">up to 90% Scope 1</text>
  <text x="375" y="331" class="node-sub">near-term, scrap-limited</text>

  <rect x="485" y="270" width="180" height="78" rx="3"
        fill="#c9dcda" stroke="#1e4d4f" stroke-width="1.4"/>
  <text x="575" y="295" class="node-label">NG-DRI + CCS</text>
  <text x="575" y="315" class="node-sub">40-60% Scope 1</text>
  <text x="575" y="331" class="node-sub">only operational route today</text>

  <rect x="685" y="270" width="160" height="78" rx="3"
        fill="#eef4f3" stroke="#1e4d4f" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="765" y="295" class="node-label">Novel routes</text>
  <text x="765" y="315" class="node-sub">MOE, AHE, smelter, NH3</text>
  <text x="765" y="331" class="node-sub">TRL &lt; 6, pre-commercial</text>

  <!-- ============================================================
       BOTTOM LAYER: ENABLERS
       ============================================================ -->

  <rect x="85" y="500" width="180" height="78" rx="3"
        fill="#e4ebf0" stroke="#3a4a5a" stroke-width="1.4"/>
  <text x="175" y="525" class="node-label-sm">Carbon pricing &amp; CBAM</text>
  <text x="175" y="545" class="node-sub" fill="#2a3848">creates market for all</text>
  <text x="175" y="561" class="node-sub" fill="#2a3848">low-carbon routes</text>

  <rect x="285" y="500" width="180" height="78" rx="3"
        fill="#e4ebf0" stroke="#3a4a5a" stroke-width="1.4"/>
  <text x="375" y="525" class="node-label-sm">Capital cycle</text>
  <text x="375" y="545" class="node-sub" fill="#2a3848">2/3 BF retire by 2030:</text>
  <text x="375" y="561" class="node-sub" fill="#2a3848">window or lock-in</text>

  <rect x="485" y="500" width="180" height="78" rx="3"
        fill="#e4ebf0" stroke="#3a4a5a" stroke-width="1.4"/>
  <text x="575" y="525" class="node-label-sm">Certification &amp; premium</text>
  <text x="575" y="545" class="node-sub" fill="#2a3848">creates demand for</text>
  <text x="575" y="561" class="node-sub" fill="#2a3848">low-carbon steel</text>

  <rect x="685" y="500" width="160" height="78" rx="3"
        fill="#e4ebf0" stroke="#3a4a5a" stroke-width="1.4"/>
  <text x="765" y="525" class="node-label-sm">Co-deployed infra</text>
  <text x="765" y="545" class="node-sub" fill="#2a3848">renewables, electrolysis,</text>
  <text x="765" y="561" class="node-sub" fill="#2a3848">ports, skilled labor</text>

  <!-- DOWNWARD: constraints → technologies (gold straight) -->
  <line x1="165" y1="118" x2="145" y2="270"
        stroke="#b8862a" stroke-width="2" marker-end="url(#arrow-gate)"/>
  <line x1="195" y1="118" x2="320" y2="270"
        stroke="#b8862a" stroke-width="2" marker-end="url(#arrow-gate)"/>
  <line x1="355" y1="118" x2="195" y2="270"
        stroke="#b8862a" stroke-width="2" marker-end="url(#arrow-gate)"/>
  <line x1="540" y1="118" x2="230" y2="270"
        stroke="#b8862a" stroke-width="2" marker-end="url(#arrow-gate)"/>
  <line x1="730" y1="118" x2="420" y2="270"
        stroke="#b8862a" stroke-width="2" marker-end="url(#arrow-gate)"/>

  <!-- UPWARD: enablers → technologies (slate straight) -->
  <!-- Carbon pricing → all 4 -->
  <line x1="155" y1="500" x2="135" y2="348"
        stroke="#3a4a5a" stroke-width="2" marker-end="url(#arrow-enable)"/>
  <line x1="175" y1="500" x2="335" y2="348"
        stroke="#3a4a5a" stroke-width="2" marker-end="url(#arrow-enable)"/>
  <line x1="195" y1="500" x2="535" y2="348"
        stroke="#3a4a5a" stroke-width="2" marker-end="url(#arrow-enable)"/>
  <line x1="215" y1="500" x2="730" y2="348"
        stroke="#3a4a5a" stroke-width="2" marker-end="url(#arrow-enable)"/>

  <!-- Certification → H2-DRI + Scrap-EAF -->
  <line x1="555" y1="500" x2="215" y2="348"
        stroke="#3a4a5a" stroke-width="2" marker-end="url(#arrow-enable)"/>
  <line x1="585" y1="500" x2="395" y2="348"
        stroke="#3a4a5a" stroke-width="2" marker-end="url(#arrow-enable)"/>

  <!-- Co-deployed infra → H2-DRI + Scrap-EAF -->
  <line x1="730" y1="500" x2="250" y2="348"
        stroke="#3a4a5a" stroke-width="2" marker-end="url(#arrow-enable)"/>
  <line x1="750" y1="500" x2="425" y2="348"
        stroke="#3a4a5a" stroke-width="2" marker-end="url(#arrow-enable)"/>

  <!-- Capital cycle → NG-DRI+CCS, dashed -->
  <line x1="375" y1="500" x2="575" y2="348"
        stroke="#3a4a5a" stroke-width="2"
        stroke-dasharray="3 3" marker-end="url(#arrow-enable)"/>

  <!-- LEGEND -->
  <g transform="translate(85, 605)">
    <rect x="0" y="-7" width="14" height="14" fill="#7fa8a6"/>
    <rect x="14" y="-7" width="14" height="14" fill="#a8c6c4"/>
    <rect x="28" y="-7" width="14" height="14" fill="#c9dcda"/>
    <text x="50" y="0" class="legend-text">Deeper teal = greater Scope 1 mitigation potential</text>

    <line x1="375" y1="0" x2="410" y2="0" stroke="#b8862a"
          stroke-width="2" marker-end="url(#arrow-gate)"/>
    <text x="416" y="0" class="legend-text">Constrains</text>

    <line x1="521" y1="0" x2="556" y2="0" stroke="#3a4a5a"
          stroke-width="2" marker-end="url(#arrow-enable)"/>
    <text x="562" y="0" class="legend-text">Enables</text>

    <line x1="652" y1="0" x2="687" y2="0" stroke="#3a4a5a"
          stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow-enable)"/>
    <text x="693" y="0" class="legend-text">Time-bound</text>
  </g>

</svg>

</div>

</body>
</html>
